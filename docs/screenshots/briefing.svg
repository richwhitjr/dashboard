  <text x="40" y="147" font-family="Georgia, serif" font-size="12" fill="#555">Issues</text>
  <text x="40" y="171" font-family="Georgia, serif" font-size="12" fill="#555">Writing</text>
  <text x="40" y="203" font-family="Georgia, serif" font-size="11" fill="#888">Email</text>
  <text x="40" y="225" font-family="Georgia, serif" font-size="11" fill="#888">Slack</text>
  <text x="40" y="247" font-family="Georgia, serif" font-size="11" fill="#888">Calendar</text>
  <text x="40" y="269" font-family="Georgia, serif" font-size="11" fill="#888">Drive</text>
  <text x="40" y="291" font-family="Georgia, serif" font-size="11" fill="#888">GitHub</text>
  <text x="40" y="313" font-family="Georgia, serif" font-size="11" fill="#888">Notion</text>
  <text x="40" y="335" font-family="Georgia, serif" font-size="11" fill="#888">Ramp</text>
  <text x="40" y="357" font-family="Georgia, serif" font-size="11" fill="#888">News</text>

  <!-- Main content area -->
  <!-- Header -->
  <text x="204" y="68" font-family="Georgia, serif" font-size="22" fill="#111" font-weight="400">Good morning</text>
  <text x="204" y="88" font-family="Georgia, serif" font-size="12" fill="#888" font-style="italic">Thursday, March 12</text>

  <!-- Weather card -->
  <rect x="204" y="104" width="160" height="64" rx="6" fill="#f8f5eb" stroke="#e0ddd1" stroke-width="1"/>
  <text x="220" y="124" font-family="Georgia, serif" font-size="11" fill="#888">Weather</text>
  <!-- Sun icon -->
  <circle cx="232" cy="148" r="10" fill="none" stroke="#e8a735" stroke-width="1.5"/>
  <circle cx="232" cy="148" r="5" fill="#e8a735"/>
  <text x="250" y="152" font-family="Georgia, serif" font-size="16" fill="#111">68°F</text>
  <text x="290" y="152" font-family="Georgia, serif" font-size="11" fill="#888">Sunny</text>

  <!-- Inbox pulse -->
  <rect x="376" y="104" width="200" height="64" rx="6" fill="#f8f5eb" stroke="#e0ddd1" stroke-width="1"/>
