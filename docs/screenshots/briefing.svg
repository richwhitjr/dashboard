  <text x="220" y="230" font-family="Georgia, serif" font-size="11" fill="#888">9:00 AM</text>
  <text x="280" y="230" font-family="Georgia, serif" font-size="11" fill="#111">Team Standup</text>
  <rect x="204" y="220" width="2" height="24" rx="1" fill="#4a90d9"/>

  <rect x="204" y="254" width="370" height="32" rx="4" fill="#f8f5eb" stroke="#e0ddd1" stroke-width="0.5"/>
  <rect x="204" y="254" width="3" height="32" rx="1.5" fill="#e8a735"/>
  <text x="220" y="268" font-family="Georgia, serif" font-size="11" fill="#888">10:30 AM</text>
  <text x="280" y="268" font-family="Georgia, serif" font-size="11" fill="#111">Product Review</text>

  <rect x="204" y="292" width="370" height="32" rx="4" fill="#f8f5eb" stroke="#e0ddd1" stroke-width="0.5"/>
  <rect x="204" y="292" width="3" height="32" rx="1.5" fill="#a00000"/>
  <text x="220" y="306" font-family="Georgia, serif" font-size="11" fill="#888">2:00 PM</text>
  <text x="280" y="306" font-family="Georgia, serif" font-size="11" fill="#111">1:1 with Engineering Lead</text>

  <!-- Priorities section -->
  <text x="204" y="356" font-family="Georgia, serif" font-size="14" fill="#111">AI Priorities</text>
  <line x1="204" y1="364" x2="580" y2="364" stroke="#e0ddd1" stroke-width="1"/>

  <text x="216" y="384" font-family="Georgia, serif" font-size="11" fill="#a00000">1.</text>
  <text x="232" y="384" font-family="Georgia, serif" font-size="11" fill="#111">Review Q1 budget proposals before EOD</text>
  <rect x="204" y="372" width="6" height="6" rx="1" fill="#a00000" opacity="0.3"/>

  <text x="216" y="404" font-family="Georgia, serif" font-size="11" fill="#a00000">2.</text>
  <text x="232" y="404" font-family="Georgia, serif" font-size="11" fill="#111">Approve open pull requests on main repo</text>

  <text x="216" y="424" font-family="Georgia, serif" font-size="11" fill="#a00000">3.</text>
  <text x="232" y="424" font-family="Georgia, serif" font-size="11" fill="#111">Follow up on hiring pipeline updates</text>

  <text x="216" y="444" font-family="Georgia, serif" font-size="11" fill="#a00000">4.</text>
  <text x="232" y="444" font-family="Georgia, serif" font-size="11" fill="#111">Prep talking points for product review</text>

  <!-- Sparkline decoration -->
  <polyline points="598,104 612,98 626,108 640,94 654,100 668,88 682,96 696,82 710,90 724,78 738,86 752,72 766,80"
    stroke="#a00000" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>
