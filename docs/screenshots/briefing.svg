<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <rect id="r" rx="8"/>
  </defs>
  <!-- Window chrome -->
  <rect width="800" height="500" rx="10" fill="#fffff8" stroke="#e0ddd1" stroke-width="1.5"/>
  <rect width="800" height="32" rx="10" fill="#f8f5eb"/>
  <rect y="24" width="800" height="8" fill="#f8f5eb"/>
  <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="16" r="5" fill="#febc2e"/>
  <circle cx="56" cy="16" r="5" fill="#28c840"/>

  <!-- Sidebar -->
